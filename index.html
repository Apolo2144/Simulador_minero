<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Carguío y Transporte</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <header>
        <h1>Registro de Ciclo</h1>
        <p>Estado: <strong>Offline</strong></p>
    </header>
<section id="gestion-flota" style="margin-bottom: 40px;">
        <h2>Gestión de Flota (Camiones)</h2>
        
        <form id="form-camion">
            <fieldset>
                <legend>Registrar Nuevo Equipo</legend>
                
                <label for="c_patente">Patente / ID Interno (Ej: CA-102):</label>
                <input type="text" id="c_patente" required style="width: 100%; padding: 10px; margin-bottom: 10px; background: #2c2c2c; color: white; border: 1px solid #555;">

                <label for="c_marca">Marca:</label>
                <input type="text" id="c_marca" required style="width: 100%; padding: 10px; margin-bottom: 10px; background: #2c2c2c; color: white; border: 1px solid #555;">

                <label for="c_modelo">Modelo:</label>
                <input type="text" id="c_modelo" required style="width: 100%; padding: 10px; margin-bottom: 10px; background: #2c2c2c; color: white; border: 1px solid #555;">

                <label for="c_capacidad">Capacidad Nominal (Toneladas):</label>
                <input type="number" id="c_capacidad" required style="width: 100%; padding: 10px; margin-bottom: 15px; background: #2c2c2c; color: white; border: 1px solid #555;">

                <button type="submit" style="background-color: #4caf50; padding: 15px;">Añadir Camión a la Flota</button>
            </fieldset>
        </form>

        <div style="overflow-x: auto; margin-top: 20px;">
            <table id="tabla-camiones">
                <thead>
                    <tr>
                        <th>ID / Patente</th>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>Capacidad (t)</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="lista-camiones">
                    </tbody>
            </table>
        </div>
    </section>
    <main>
        <form id="formulario-simulador">
            
            <fieldset>
                <legend>Datos del Equipo</legend>
                <label for="capacidad">Capacidad Neta (Toneladas):</label>
                <input type="number" id="capacidad" name="capacidad" required>
            </fieldset>

            <fieldset>
                <legend>Tiempos Operativos (Minutos)</legend>
                
                <label for="t_carguio">Tiempo de Carguío:</label>
                <input type="number" id="t_carguio" name="t_carguio" step="0.1" required>

                <label for="t_viaje">Viaje con Carga:</label>
                <input type="number" id="t_viaje" name="t_viaje" step="0.1" required>

                <label for="t_descarga">Tiempo de Descarga:</label>
                <input type="number" id="t_descarga" name="t_descarga" step="0.1" required>

                <label for="t_retorno">Retorno Vacío:</label>
                <input type="number" id="t_retorno" name="t_retorno" step="0.1" required>

                <label for="t_espera">Esperas o Demoras:</label>
                <input type="number" id="t_espera" name="t_espera" step="0.1" value="0" required>
            </fieldset>

            <button type="submit" id="btn-calcular">Calcular Productividad</button>

        </form>
    </main>
<section id="resultados">
        <h2>Resultados</h2>
        <p>Tiempo de Ciclo Total: <span id="res-tiempo-ciclo">--</span> min</p>
        <p>Productividad Real: <span id="res-productividad">--</span> Ton/h</p>
    </section>

    <button type="button" id="btn-exportar" style="background-color: #2196F3; margin-top: 20px;">Exportar Turno (CSV)</button>

    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="app.js"></script>
</body>
</html>
